name: Test for broken links

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/production-crawler.yml"
    branches:
      - "*"

jobs:
  windows:
    runs-on: windows-latest
    name: Test site for broken links
    env:
      ARGIOPE_VERSION: "0.3.5"
      ARGIOPE_WINDOWS_X86_64_SHA256: "4ee6599a0564a6c204d35f1448d045562d0013ea2d1d5c1f80d02f9314cddd4d"
    steps:
      - name: Install argiope
        shell: pwsh
        run: |
          $archive = "$env:RUNNER_TEMP\argiope-windows-x86_64.zip"
          $extractPath = "$env:RUNNER_TEMP\argiope"
          $expectedSha256 = $env:ARGIOPE_WINDOWS_X86_64_SHA256
          $url = "https://github.com/christianhelle/argiope/releases/download/$env:ARGIOPE_VERSION/argiope-windows-x86_64.zip"

          Invoke-WebRequest -Uri $url -OutFile $archive

          $actualSha256 = (Get-FileHash -Path $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256) {
            throw "argiope archive checksum mismatch: expected $expectedSha256, got $actualSha256"
          }

          Expand-Archive -Path $archive -DestinationPath $extractPath -Force
          if (-not (Test-Path (Join-Path $extractPath "argiope.exe"))) {
            throw "argiope.exe was not found after extracting $archive"
          }

          $extractPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Run argiope
        shell: pwsh
        run: |
          argiope.exe check https://christianhelle.com --report broken-links-report.txt --report-format text
          Get-Content broken-links-report.txt
      - name: Publish results
        uses: actions/upload-artifact@v5
        with:
          name: Artifacts
          path: |
            broken-links-report.txt
