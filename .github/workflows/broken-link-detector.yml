name: Test for broken links

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/production-crawler.yml"
    branches:
      - "*"

jobs:
  windows:
    runs-on: windows-latest
    name: Test site for broken links
    steps:
      - name: Install argiope
        shell: pwsh
        run: |
          $destination = "$env:RUNNER_TEMP\argiope.exe"
          Invoke-WebRequest -Uri "https://github.com/christianhelle/argiope/releases/latest/download/argiope-windows-x86_64.exe" -OutFile $destination
          $env:RUNNER_TEMP | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Run argiope
        shell: pwsh
        run: |
          argiope.exe check https://christianhelle.com --report broken-links-report.txt --report-format text
          Get-Content broken-links-report.txt
      - name: Publish results
        uses: actions/upload-artifact@v5
        with:
          name: Artifacts
          path: |
            broken-links-report.txt
